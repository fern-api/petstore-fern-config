name: Release Rust SDK

on:
  push:
    branches:
      - main
    paths:
      # a) API spec changes
      - "fern/openapi.yml"
      - "fern/openapi-overlay.yml"
      # b) Fern CLI version changes
      - "fern/fern.config.json"
      # c) Generator version changes
      - "fern/generators.yml"
  workflow_dispatch:

jobs:
  preview-and-validate:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-A warnings"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Fern CLI
        uses: fern-api/setup-fern-cli@v1

      - name: Generate preview
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
        run: fern generate --group rust-sdk --preview --output ./preview --log-level debug

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Check
        working-directory: ./preview/fern-rust-sdk
        run: cargo check

      - name: Build
        working-directory: ./preview/fern-rust-sdk
        run: cargo build

      - name: Setup WireMock server
        working-directory: ./preview/fern-rust-sdk
        run: |
          if [ -f wiremock/docker-compose.test.yml ]; then
            docker compose -f wiremock/docker-compose.test.yml down 2>/dev/null || true
            docker compose -f wiremock/docker-compose.test.yml up -d --wait
            WIREMOCK_PORT=$(docker compose -f wiremock/docker-compose.test.yml port wiremock 8080 | cut -d: -f2)
            echo "WIREMOCK_URL=http://localhost:$WIREMOCK_PORT" >> $GITHUB_ENV
          fi

      - name: Test
        working-directory: ./preview/fern-rust-sdk
        run: RUN_WIRE_TESTS=true cargo test -- --test-threads=1

      - name: Teardown WireMock server
        if: always()
        working-directory: ./preview/fern-rust-sdk
        run: |
          if [ -f wiremock/docker-compose.test.yml ]; then
            docker compose -f wiremock/docker-compose.test.yml down
          fi

  release:
    needs: preview-and-validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Fern CLI
        uses: fern-api/setup-fern-cli@v1

      - name: Generate Rust SDK
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
        run: fern generate --group rust-sdk --log-level debug --version AUTO
