overlay: 1.0.0
info:
  title: Add OAuth token endpoint
  version: 1.0.0

actions:
  - target: "$.paths"
    update:
      /auth/token:
        post:
          summary: Get an access token
          operationId: auth_getToken
          x-fern-sdk-group-name: auth
          x-fern-sdk-method-name: getToken
          security: []
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - client_id
                    - client_secret
                  properties:
                    client_id:
                      type: string
                      description: OAuth2 client ID.
                    client_secret:
                      type: string
                      description: OAuth2 client secret.
          responses:
            "200":
              description: Successful token response.
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/TokenResponse"

  - target: "$.components.schemas"
    update:
      TokenResponse:
        type: object
        required:
          - access_token
          - expires_in
        properties:
          access_token:
            type: string
            description: The access token.
          expires_in:
            type: integer
            description: Token lifetime in seconds.
