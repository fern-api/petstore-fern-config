# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
# trigger release for 0.14.0
api:
  auth:
    any:
      - Bearer
      - OAuth
  specs:
    - openapi: openapi.yml
      overlays: openapi-overlay.yml

auth-schemes:
  Bearer:
    scheme: bearer
    token:
      env: PETSTORE_TOKEN
  OAuth:
    scheme: oauth
    type: client-credentials
    get-token:
      endpoint: POST /auth/token
      request-properties:
        client-id: $request.client_id
        client-secret: $request.client_secret
      response-properties:
        access-token: $response.access_token
        expires-in: $response.expires_in

readme:
  apiName: PetStore

default-group: cli
groups:
  cli:
    generators:
      - name: fern-cli-generator
        version: 0.16.4
        smart-casing: true
        output:
          location: npm
          package-name: "@fern-api/example-cli-petstore"
          token: OIDC
        github:
          repository: fern-api/petstore-cli
          mode: release

  local-cli:
    generators:
      - name: fern-cli-generator
        version: 0.16.4
        smart-casing: true
        output:
          location: local-file-system
          path: ../sdks/petstore-cli

  ts-sdk:
    generators:
      - name: fern-typescript-sdk
        version: 3.71.4
        smart-casing: true
        output:
          location: npm
          package-name: "@fern-api/example-typescript-sdk-petstore"
          token: OIDC
        github:
          repository: fern-api/petstore-typescript-sdk
          mode: release

  rust-sdk:
    generators:
      - name: fern-rust-sdk
        version: 0.40.2
        smart-casing: true
        output:
          location: crates
          package-name: petstore
        github:
          repository: fern-api/petstore-rust-sdk
          mode: push
        config:
          clientClassName: PetstoreClient
          crateName: petstore
          enableWireTests: true
  # ──────────────────────────────────────────────────────────────
