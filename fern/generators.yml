# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
api:
  specs:
    - openapi: openapi.yml

auth-schemes:
  Bearer:
    scheme: bearer
    token:
      env: PETSTORE_TOKEN

default-group: cli
groups:
  ts-sdk:
    generators:
      - name: fern-typescript-sdk
        version: 3.71.3
        smart-casing: true
        output:
          location: npm
          package-name: "@fern-api/example-typescript-sdk-petstore"
          token: OIDC
        github:
          repository: fern-demo/petstore-typescript-sdk
          mode: release

  cli:
    generators:
      - name: fern-cli-generator
        version: 0.9.0
        smart-casing: true
        output:
          location: npm
          package-name: "@fern-api/example-cli-petstore"
          token: OIDC
        github:
          repository: fern-demo/petstore-cli
          mode: release
